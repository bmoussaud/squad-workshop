name: Python CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check generated package residue
        run: test -z "$(find . -path './.git' -prune -o -path './.venv' -prune -o -type d -name '*.egg-info' -print -quit)"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Sync locked environment
        run: uv sync --locked

      - name: Run test suite
        run: uv run python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: uv run python -m compileall -q src tests

      - name: Check lockfile consistency
        run: uv lock --check

      - name: Check repository whitespace
        run: git diff --check
