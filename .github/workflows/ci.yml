name: Python CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check generated package residue
        run: test -z "$(find . -path './.git' -prune -o -path './.venv' -prune -o -type d -name '*.egg-info' -print -quit)"

      - name: Install uv
        uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4 # v6.7.0
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Sync locked environment
        run: uv sync --locked

      - name: Run test suite
        run: uv run python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: uv run python -m compileall -q src tests

      - name: Check lockfile consistency
        run: uv lock --check

      - name: Check repository whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git hash-object -t tree /dev/null)"
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git diff --check "$BASE_SHA...$HEAD_SHA"
          else
            git diff --check "$BASE_SHA" "$HEAD_SHA"
          fi
